                    "primary-fixed": "#e3dfff",
                    "surface-container-high": "#1c2b3c",
                    "on-tertiary": "#502500",
                    "on-secondary-fixed-variant": "#3529c2",
                    "surface-dim": "#051424",
                    "primary-fixed-dim": "#c4c0ff",
                    "on-tertiary-fixed": "#301400",

<body class="bg-void text-on-background font-body-md antialiased min-h-screen flex flex-col">
<!-- TopNavBar (Shared Component) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 max-w-7xl mx-auto bg-[#0a0a14]/80 backdrop-blur-xl border-b border-white/10 font-inter antialiased">
<div class="text-xl font-bold tracking-tight text-white">Skill Hub</div>
<nav class="hidden md:flex items-center space-x-lg">
<a class="text-slate-400 hover:text-white transition-colors" href="#">Product</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">Solutions</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">Pricing</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">About</a>
</nav>
<div class="flex items-center space-x-sm">
<button class="px-sm py-xs text-slate-400 hover:text-white transition-colors">Sign In</button>
<button class="px-md py-xs bg-[#6c63ff] text-white rounded-lg font-semibold hover:brightness-110 transition-all duration-200 active:scale-95 opacity-80">Get Started</button>
</div>
</header>
<!-- Main Registration Section -->
<main class="flex-grow flex items-center justify-center px-container-margin py-xl mt-16">
<div class="w-full max-w-[480px] glass-panel rounded-xl indigo-glow p-md md:p-xl">
<!-- Branding/Heading -->
<div class="flex flex-col items-center text-center mb-xl">
<div class="mb-sm text-[#6c63ff]">
<span class="material-symbols-outlined !text-4xl">bolt</span>
</div>
<h1 class="font-h1 text-h1 text-white mb-base">Create Account</h1>
<p class="font-subtitle text-subtitle text-on-surface-variant">Join Skill Hub today</p>
</div>
<!-- Registration Form -->
<form class="space-y-sm">
<!-- Full Name -->
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant/40">person</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-sm pl-xl pr-sm text-white placeholder:text-white/40 focus:ring-2 focus:ring-[#6c63ff] focus:border-[#6c63ff] focus:outline-none transition-all" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant/40">mail</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-sm pl-xl pr-sm text-white placeholder:text-white/40 focus:ring-2 focus:ring-[#6c63ff] focus:border-[#6c63ff] focus:outline-none transition-all" placeholder="you@example.com" type="email"/>
</div>
<!-- Password -->
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant/40">lock</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-sm pl-xl pr-sm text-white placeholder:text-white/40 focus:ring-2 focus:ring-[#6c63ff] focus:border-[#6c63ff] focus:outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<!-- Confirm Password -->
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant/40">lock</span>
<input class="w-full bg-white/5 border border-white/10 rounded-xl py-sm pl-xl pr-sm text-white placeholder:text-white/40 focus:ring-2 focus:ring-[#6c63ff] focus:border-[#6c63ff] focus:outline-none transition-all" placeholder="••••••••" type="password"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-r from-[#6c63ff] to-[#5a54e6] text-white py-sm rounded-xl font-semibold hover:brightness-110 hover:shadow-[0_0_15px_rgba(108,99,255,0.4)] active:scale-95 transition-all mt-base" type="submit">
                    Create Account
                </button>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-white/10"></div>
<span class="flex-shrink mx-sm font-subtitle text-subtitle text-on-surface-variant/40">or</span>
<div class="flex-grow border-t border-white/10"></div>
</div>
<!-- Social Action -->
<button class="w-full bg-transparent border border-white/10 py-sm rounded-xl text-white font-semibold flex items-center justify-center gap-xs hover:border-[#6c63ff] hover:bg-white/5 transition-all" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
                    Sign up with Google
                </button>
</form>
<!-- Footer Link -->
<div class="mt-lg text-center font-subtitle text-subtitle">
<span class="text-slate-500">Already have an account? </span>
<a class="text-[#6c63ff] font-semibold hover:underline" href="#">Sign In</a>
</div>
</div>
</main>
<!-- Footer (Shared Component) -->
<footer class="w-full px-8 py-12 flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0 bg-[#0a0a14] border-t border-white/5 font-inter text-sm text-slate-500">
<div class="text-lg font-bold text-white/80">Skill Hub</div>
<div class="text-center md:text-left">
            © 2024 Skill Hub AI. Precision-engineered for technical teams.
        </div>
<div class="flex space-x-md">
<a class="text-slate-500 hover:text-[#6c63ff] transition-colors" href="#">Privacy Policy</a>
<a class="text-slate-500 hover:text-[#6c63ff] transition-colors" href="#">Terms of Service</a>
<a class="text-slate-500 hover:text-[#6c63ff] transition-colors" href="#">Security</a>
<a class="text-slate-500 hover:text-[#6c63ff] transition-colors" href="#">Status</a>
</div>
</footer>
<!-- Aesthetic Decorative Element -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-[#6c63ff]/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-secondary-container/5 rounded-full blur-[120px]"></div>
</div>
</body></html>
